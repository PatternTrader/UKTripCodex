<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Trip Photo Gallery</title>
  <style>
    :root {
      --bg: #f4efe5;
      --panel: rgba(255, 252, 245, 0.94);
      --ink: #201c16;
      --muted: #685f54;
      --line: #d8cfbf;
      --used: #1d9c45;
      --used-glow: rgba(29, 156, 69, 0.22);
      --accent: #9f6a24;
      --shadow: 0 18px 40px rgba(40, 28, 11, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 30%),
        linear-gradient(180deg, #efe7d7 0%, var(--bg) 100%);
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero,
    .day-section {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.94;
      letter-spacing: -0.035em;
    }

    .subtitle,
    .summary,
    .day-subtitle,
    .day-title {
      margin: 0;
      color: var(--muted);
    }

    .subtitle,
    .summary,
    .day-subtitle {
      font-size: 1rem;
      line-height: 1.5;
    }

    .summary {
      margin-top: 12px;
    }

    .legend {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(32, 28, 22, 0.08);
      border: 1px solid rgba(32, 28, 22, 0.15);
      color: #3f382f;
      font-weight: 700;
    }

    .legend::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(32, 28, 22, 0.92) 0 50%, rgba(159, 106, 36, 0.94) 50% 100%);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      align-items: center;
    }

    .action-button {
      appearance: none;
      border: 1px solid rgba(32, 28, 22, 0.18);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .action-button.primary {
      background: #1f5f3a;
      border-color: #1f5f3a;
      color: #fff;
    }

    .action-status {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .sections {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .day-section {
      padding: 18px;
    }

    .day-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .day-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.98rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .day-kicker .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
    }

    .day-title {
      font-size: 1.1rem;
      color: var(--ink);
      font-weight: 700;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .poi-rows {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .poi-row {
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .poi-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .poi-row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .poi-row-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
    }

    .poi-row-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .row-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .picker-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 250, 241, 0.9);
    }

    .picker-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .picker-group label,
    .picker-status {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .picker-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    .picker-group select[multiple] {
      min-height: 180px;
    }

    .picker-status {
      align-self: end;
      text-transform: none;
      color: #0b5d24;
    }

    .card {
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(56, 43, 20, 0.08);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .frame {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #e8dfd0;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(17, 104, 43, 0.94);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge.candidate {
      background: rgba(159, 106, 36, 0.94);
    }

    .badge.imported {
      left: auto;
      right: 12px;
      background: rgba(33, 84, 166, 0.94);
    }

    .badge.selected-left,
    .badge.selected-right {
      top: auto;
      bottom: 12px;
      background: rgba(32, 28, 22, 0.92);
    }

    .badge.selected-right {
      left: auto;
      right: 12px;
    }

    .meta {
      padding: 14px 14px 16px;
    }

    .poi {
      margin: 0;
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--ink);
    }

    .caption,
    .filename,
    .empty {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .empty {
      margin-top: 4px;
      font-style: italic;
    }

    @media (max-width: 700px) {
      .page {
        padding: 16px 12px 36px;
      }

      .hero,
      .day-section {
        border-radius: 18px;
      }

      .hero,
      .day-section {
        padding: 16px;
      }

      .photo-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }
  </style>
</head>

        <p class="action-status" id="action-status">Save to `project-state.js` before moving to another machine or pushing to GitHub.</p>

    </section>
    <div class="sections" id="sections"></div>
  </main>

    function getProjectStateFromFile() {
      const state = window.UK_TRIP_PROJECT_STATE || {};
      return {
        photoOverrides: state.photoOverrides && typeof state.photoOverrides === "object" ? state.photoOverrides : {},
        previewImports: state.previewImports && typeof state.previewImports === "object" ? state.previewImports : {}
      };
    }

    function getPhotoOverrides() {
      const fileState = getProjectStateFromFile();
      try {
        const raw = localStorage.getItem(PHOTO_OVERRIDE_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return { ...fileState.photoOverrides, ...(parsed && typeof parsed === "object" ? parsed : {}) };
      } catch (error) {
        return { ...fileState.photoOverrides };
      }
    }

    function savePhotoOverrides(overrides) {
      localStorage.setItem(PHOTO_OVERRIDE_STORAGE_KEY, JSON.stringify(overrides));
    }

    function getPreviewImportsByPage() {
      const fileState = getProjectStateFromFile();
      try {
        const raw = localStorage.getItem(PREVIEW_IMPORT_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const merged = { ...fileState.previewImports };
        if (parsed && typeof parsed === "object") {
          Object.entries(parsed).forEach(([page, entries]) => {
            const existing = Array.isArray(merged[page]) ? merged[page].slice() : [];
            const incoming = Array.isArray(entries) ? entries : [];
            incoming.forEach((entry) => {
              if (!entry || typeof entry.file !== "string") return;
              if (existing.some((existingEntry) => existingEntry && existingEntry.file === entry.file)) return;
              existing.push(entry);
            });
            merged[page] = existing;
          });
        }
        return merged;
      } catch (error) {
        return { ...fileState.previewImports };
      }
    }

    function getImportedEntriesForPage(page) {
      const imports = getPreviewImportsByPage()[page];
      if (!Array.isArray(imports)) return [];
      return imports.filter((entry) => entry && typeof entry.file === "string" && entry.file.trim()).map((entry) => ({
        file: entry.file,
        caption: entry.caption || `Imported preview photo for ${pageLabels[page] || page}`,
        poi: entry.poi || pageLabels[page] || page,
        source: "preview"
      }));
    }

    function getPhotoSource(fileOrUrl) {
      return /^(https?:|data:image|file:\/\/\/)/i.test(fileOrUrl)
        ? fileOrUrl
        : `photos/${encodeURIComponent(fileOrUrl)}`;
    }

    function getDisplayFileLabel(fileOrUrl) {
      if (!/^(https?:|data:image|file:\/\/\/)/i.test(fileOrUrl)) return fileOrUrl;
      if (/^data:image/i.test(fileOrUrl)) return "Embedded image";
      if (/^file:\/\/\//i.test(fileOrUrl)) {
        const parts = fileOrUrl.split("/");
        return decodeURIComponent(parts[parts.length - 1] || fileOrUrl);
      }
      try {
        const url = new URL(fileOrUrl);
        const parts = url.pathname.split("/").filter(Boolean);
        const tail = parts.slice(-2).join("/") || url.pathname;
        return `${url.hostname} / ${decodeURIComponent(tail)}`;
      } catch (error) {
        return fileOrUrl;
      }
    }

    function updateSummary() {
      const importedCount = Object.values(getPreviewImportsByPage())
        .flat()
        .filter((entry) => entry && typeof entry.file === "string" && entry.file.trim())
        .length;
      summaryEl.textContent = `${allPhotos.length} total local photos. Pick which photos belong in the left carousel and which belong in the right carousel for each POI row, then reload the UK site in the same browser. ${importedCount} preview photos have been sent into the selector. ${unassignedPhotos.length} local photos still remain ungrouped.`;
    }

    function buildProjectStatePayload() {
      return {
        photoOverrides: getPhotoOverrides(),
        previewImports: getPreviewImportsByPage()
      };
    }

    function notifyWorkspaceOfState() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: "ukTripProjectStateUpdate",
          payload: buildProjectStatePayload()
        }, "*");
      }
    }

    function serializeProjectState() {
      const payload = buildProjectStatePayload();
      return `window.UK_TRIP_PROJECT_STATE = ${JSON.stringify(payload, null, 2)};\n`;
    }

    function downloadProjectStateFile() {
      const blob = new Blob([serializeProjectState()], { type: "application/javascript;charset=utf-8" });
      const blobUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = blobUrl;
      link.download = "project-state.js";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    }

    async function saveProjectStateFile() {
      const content = serializeProjectState();
      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: "project-state.js",
            types: [
              {
                description: "JavaScript project state",
                accept: { "application/javascript": [".js"] }
              }
            ]
          });
          const writable = await handle.createWritable();
          await writable.write(content);
          await writable.close();
          actionStatusEl.textContent = "Saved project-state.js. Commit that file so another machine will load the same selections.";
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }
      downloadProjectStateFile();
      actionStatusEl.textContent = "Downloaded project-state.js. Move it into the project folder and commit it to GitHub.";
    }

    function getPageOptions(page) {
      const options = [];
      [...(photoAssignments[page] || []), ...(candidatePhotosByPage[page] || []), ...getImportedEntriesForPage(page)].forEach((entry) => {
        if (!entry || !entry.file) return;
        if (options.some((option) => option.file === entry.file)) return;
        options.push({
          file: entry.file,
          caption: entry.caption || entry.file,
          poi: entry.poi || pageLabels[page] || page
        });
      });
      return options;
    }

    function getDefaultSelection(page) {
      const options = getPageOptions(page);
      return {
        leftCarousel: options[0] ? [options[0].file] : [],
        rightCarousel: options[1] ? [options[1].file] : (options[0] ? [options[0].file] : [])
      };
    }

    function getSelectionForPage(page) {
      const overrides = getPhotoOverrides();
      const options = getPageOptions(page).map((option) => option.file);
      const defaults = getDefaultSelection(page);
      const saved = overrides[page] || {};
      const hasLeftCarousel = Object.prototype.hasOwnProperty.call(saved, "leftCarousel");
      const hasRightCarousel = Object.prototype.hasOwnProperty.call(saved, "rightCarousel");
      const selection = {
        leftCarousel: hasLeftCarousel && Array.isArray(saved.leftCarousel)
          ? saved.leftCarousel.filter((file) => options.includes(file))
          : [saved.leftTop, saved.leftBottom, saved.left].filter((file) => options.includes(file)),
        rightCarousel: hasRightCarousel && Array.isArray(saved.rightCarousel)
          ? saved.rightCarousel.filter((file) => options.includes(file))
          : [saved.rightTop, saved.rightBottom, saved.right].filter((file) => options.includes(file))
      };
      if (!hasLeftCarousel && !selection.leftCarousel.length) selection.leftCarousel = defaults.leftCarousel.slice();
      if (!hasRightCarousel && !selection.rightCarousel.length) selection.rightCarousel = defaults.rightCarousel.slice();
      return selection;
    }

    function getSelectionBadges(entryFile, selection) {
      const badges = [];
      if (selection.leftCarousel.includes(entryFile)) badges.push('<div class="badge selected-left">Left Carousel</div>');
      if (selection.rightCarousel.includes(entryFile)) badges.push('<div class="badge selected-right">Right Carousel</div>');
      return badges;
    }

    function cardMarkup(entry, state = "used", selection = { leftCarousel: [], rightCarousel: [] }) {
      const badges = [];
      if (state === "candidate") badges.push('<div class="badge candidate">Candidate</div>');
      if (state === "imported") badges.push('<div class="badge imported">From Preview</div>');
      badges.push(...getSelectionBadges(entry.file, selection));
      return `
        <article class="card">
          <div class="frame">
            <img src="${getPhotoSource(entry.file)}" alt="${entry.caption || entry.file}" loading="lazy">
            ${badges.join("")}
          </div>
          <div class="meta">
            <p class="poi">${entry.poi || "Unassigned photo"}</p>
            <p class="caption">${entry.caption || "Not yet placed in the itinerary"}</p>
            <p class="filename" title="${entry.file}">${getDisplayFileLabel(entry.file)}</p>
          </div>
        </article>
      `;
    }

    function renderPoiRow(page) {
      const assigned = photoAssignments[page] || [];
      const candidates = candidatePhotosByPage[page] || [];
      const imported = getImportedEntriesForPage(page).filter((entry) =>
        !assigned.some((assignedEntry) => assignedEntry.file === entry.file) &&
        !candidates.some((candidateEntry) => candidateEntry.file === entry.file)
      );
      const total = assigned.length + candidates.length + imported.length;
      const selection = getSelectionForPage(page);
      const options = getPageOptions(page);
      if (!total) {
        return `
          <div class="poi-row">
            <div class="poi-row-head">
              <p class="poi-row-title">${pageLabels[page] || page}</p>
              <p class="poi-row-meta">No photos grouped here yet</p>
            </div>
            <p class="empty">No assigned or candidate photos are connected to this stop yet.</p>
          </div>
        `;
      }

      return `
        <div class="poi-row" data-page="${page}">
          <div class="poi-row-head">
            <p class="poi-row-title">${pageLabels[page] || page}</p>
            <p class="poi-row-meta">${assigned.length} assigned, ${candidates.length + imported.length} available</p>
          </div>
          <div class="picker-bar">
            <div class="picker-group">
              <label for="left-carousel-${page}">Left side carousel</label>
              <select id="left-carousel-${page}" multiple data-photo-role="leftCarousel" data-page="${page}">
                ${options.map((option) => `<option value="${option.file}"${selection.leftCarousel.includes(option.file) ? " selected" : ""}>${option.file}</option>`).join("")}
              </select>
            </div>
            <div class="picker-group">
              <label for="right-carousel-${page}">Right side carousel</label>
              <select id="right-carousel-${page}" multiple data-photo-role="rightCarousel" data-page="${page}">
                ${options.map((option) => `<option value="${option.file}"${selection.rightCarousel.includes(option.file) ? " selected" : ""}>${option.file}</option>`).join("")}
              </select>
            </div>
            <div class="picker-status">Saved for the UK site on reload</div>
          </div>
          ${(candidates.length || imported.length) ? '<p class="row-note">Assigned photos appear first. Candidate photos follow in the same row. Photos marked From Preview were sent in from the discovery page. Select any number of photos for the left carousel and right carousel.</p>' : '<p class="row-note">Select any number of photos for the left carousel and right carousel.</p>'}
          <div class="photo-grid">
            ${assigned.map((entry) => cardMarkup(entry, "used", selection)).join("")}
            ${candidates.map((entry) => cardMarkup(entry, "candidate", selection)).join("")}
            ${imported.map((entry) => cardMarkup(entry, "imported", selection)).join("")}
          </div>
        </div>
      `;
    }

    function renderGallery() {
      updateSummary();
      const daySections = itinerary.map((day) => {
        return `
          <section class="day-section">
            <div class="day-head">
              <div>
                <div class="day-kicker">
                  <span>Day ${day.day}</span>
                  <span class="dot"></span>
                  <span>${day.weekday}</span>
                  <span class="dot"></span>
                  <span>${day.date}</span>
                </div>
                <p class="day-title">${day.title}</p>
              </div>
              <p class="day-subtitle">${day.pages.length} POI rows in this part of the trip</p>
            </div>
            <div class="poi-rows">
              ${day.pages.map((page) => renderPoiRow(page)).join("")}
            </div>
          </section>
        `;
      }).join("");

      const unassignedSection = `
        <section class="day-section">
          <div class="day-head">
            <div>
              <div class="day-kicker">
                <span>Unassigned</span>
                <span class="dot"></span>
                <span>Not Yet Placed</span>
              </div>
              <p class="day-title">Photos still in the folder but not currently used by the UK website</p>
            </div>
            <p class="day-subtitle">${unassignedPhotos.length} photos waiting for placement</p>
          </div>
          <div class="photo-grid">
            ${unassignedPhotos.map((file) => cardMarkup({ file }, "plain")).join("")}
          </div>
        </section>
      `;

      sectionsEl.innerHTML = daySections + unassignedSection;
    }

    function updateSelection(page, role, value) {
      const overrides = getPhotoOverrides();
      const next = { ...(overrides[page] || {}), [role]: value };
      overrides[page] = next;
      savePhotoOverrides(overrides);
      renderGallery();
      notifyWorkspaceOfState();
    }

    sectionsEl.addEventListener("change", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLSelectElement)) return;
      const page = target.getAttribute("data-page");
      const role = target.getAttribute("data-photo-role");
      if (!page || !role) return;
      updateSelection(page, role, Array.from(target.selectedOptions).map((option) => option.value));
    });

    saveProjectStateButton.addEventListener("click", () => {
      saveProjectStateFile();
    });

    downloadProjectStateButton.addEventListener("click", () => {
      downloadProjectStateFile();
      actionStatusEl.textContent = "Downloaded project-state.js. Keep that file with the project so another machine sees the same selections.";
    });

    window.addEventListener("storage", (event) => {
      if (event.key === PHOTO_OVERRIDE_STORAGE_KEY || event.key === PREVIEW_IMPORT_STORAGE_KEY) {
        renderGallery();
        notifyWorkspaceOfState();
      }
    });

    renderGallery();
    notifyWorkspaceOfState();
  </script>
</body>
</html>
